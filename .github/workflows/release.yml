# Releases are built and published locally using package.bat, which:
#   1. Runs  dotnet build -c Release
#   2. Packages the output into a versioned ZIP
#   3. Pushes the version tag and creates a GitHub Release via gh CLI
#
# This workflow is intentionally disabled. Revit plugins require RevitAPI.dll
# which is not available on standard CI agents.
#
# To publish a new release, run package.bat from the project root.

name: Release (disabled)

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'This workflow is disabled. Use package.bat locally.'
        required: false

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Releases are built locally. See package.bat."
